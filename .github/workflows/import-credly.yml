name: Import Credly Certificates

on:
  schedule:
    - cron: "0 6 * * MON"   # every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import_certificates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Import Credly certificates
        uses: michaelcontento/credly-import-action@v1
        with:
          name: may-pyae-phyo-thaw
          datafile: data/credly/Badges.json
          imagedir: data/credly/images
          skip_image_downloading: 0

      - name: Commit and push badges data
        uses: EndBug/add-and-commit@v9
        with:
          message: "chore: update Credly certificates"
          add: "data/credly/**"
          default_author: github_actions
